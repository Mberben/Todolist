<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Accueil</title>
    <link rel="icon" type="image/x-icon" href="favicon.ico">
    <link rel="stylesheet" href="styles.css">
</head>
<body>

    <main class="page-connexion">
        <div class="illustration">
            <img src="Images/Image-accueil.png" alt="Illustration">
        </div>
        <div class="connexion-form">
            <h1>Identifiez-vous</h1>
            <form id="form-connection" >
                <label for="Prenom">Prenom</label>
                <input type="text" id="Prenom" name="Prenom" required>
                <p class="message-erreur" id="message-erreur">Le champ ne peut pas être vide.</p>

                <button type="submit">Voir la liste des tâches</button>
            </form>



        </div>
    </main>
</body>
</html>
