<!doctype html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Liste des tâches</title>
    <link rel="icon" type="image/x-icon" href="favicon.ico" />
    <link rel="stylesheet" href="style.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />

      href="https://fonts.googleapis.com/css2?family=Poppins:wght@200;300;400;500;600;700&display=swap"

  <body class="page-taches">
    <aside class="sidebar">
      <div class="profil">
        <!-- avatar + "Mathias" -->
        <img src="Images/avatar.png" alt="Mathias" />
        <p id="username">Mathias</p>
      </div>
      <nav>
        <!-- les liens Tâches / Statistiques -->
        <ul>
          <li><a href="Taches.html"> <img src="Images/task-square.png" alt="">Tâches</a></li>
          <li><a href="Statistiques.html"> <img src="Images/graph.png" class="active" alt="">Statistiques</a></li>
        </ul>
      </nav>

    <main class="Mes-taches">
        <H1>Mes tâches</H1>
        <div class="A-faire">
            <h2 class="titre-tache">A faire</h2>
            <input type="checkbox" id="tache1" />
            <label for="tache1">Faire la tarte aux pommes</label><br /> 
            <input type="checkbox" id="tache2" />
            <label for="tache2">Rendre dossier scolaire</label><br />

        </div>
        <div class="Terminée">
            <h2 class="titre-tache">Terminée</h2>
            <input type="checkbox" id="tache3" checked />
            <label for="tache3">Aller chez le médecin</label><br />

        </div>
        <button class="ajouter-tache"> + Ajouter une tâche</button>




    </main>
      
       
    
  </>
